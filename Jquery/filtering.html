<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jQuery Filtering</title>
    <script src="jquery-4.0.0.min.js"></script>
</head>
<body>
    <h1>jQuery Filtering</h1>
    <ul id="items">
        <li>List 1</li>
        <li class="red">List 2</li>
        <li>List 3</li>
        <li class="green">List 4</li>
        <li>List 5</li>
        <li>List 6</li>
    </ul>

    <script>
        $(document).ready(function() {
            const $items = $('#items li');
            $items.first().add($items.last()).add($items.eq(2)).add($items.eq(-2)).css('color', 'blue');
            $items.filter('.red').css('color', 'red');
            $items.filter('.green').css('color', 'green');
        });
    </script>
</body>
</html>
