<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jQuery Classes</title>
     <script src="jquery-4.0.0.min.js"></script>
     <style>
        body { font-family: Arial, sans-serif; padding: 2rem; }
        .cyan {
            color: #0e7490;
            background: #cffafe;
            padding: 1rem;
        }
     </style>
</head>
<body>
    
<button class="addbtn" type="button">Add class</button>
<button class="removebtn" type="button">Remove class</button>
<button class="togglebtn" type="button">Toggle class</button>

<div id="message">
    Lorem ipsum dolor sit, amet consectetur adipisicing elit. Ipsum dolor odio tempora. Doloribus alias debitis quasi quaerat praesentium, dolorem totam dolorum odio repellendus sunt exercitationem odit ex! Dolorem, nulla illum.
</div>

<script>
    $(document).ready(function(){
        $('.addbtn').click(function(){
            $('#message').addClass('cyan')
        })
        $('.removebtn').click(function(){
            $('#message').removeClass('cyan')
        })
        $('.togglebtn').click(function(){
            $('#message').toggleClass('cyan')
        })
    })
</script>
</body>
</html>
