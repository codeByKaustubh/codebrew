<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jQuery AJAX</title>
    <script src="jquery-4.0.0.min.js"></script>
</head>
<body>
    <main>
      <h1>Load content with AJAX</h1>
      <button id="loadButton" type="button">Load content</button>
      <div id="result" aria-live="polite"></div>
    </main>

    <script>
        $('#loadButton').on('click', function () {
          $('#result').load('ajax.txt', function (_, status) {
            if (status === 'error') $('#result').text('Could not load the content.');
          });
        });
    </script>
</body>
</html>
