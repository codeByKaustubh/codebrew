<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jQuery DOM Methods</title>
    <script src="jquery-4.0.0.min.js"></script>
</head>
<body>
    <h1>jQuery DOM Methods</h1>
    <ul id="links">
        <li>link 1</li>
        <li>link 2</li>
        <li>link 3</li>
    </ul>

    <button class="appendBtn">Append</button>
    <button class="prependBtn">Prepend</button>
    <button class="afterBtn">After</button>
    <button class="beforeBtn">Before</button>

    <button class="removeBtn">Remove</button>
    <button class="emptyBtn">Empty</button>

    <script>
        $(document).ready(function(){
            $(".appendBtn").click(function(){
                $("#links").append("<li>Append</li>")
            });
            $(".prependBtn").click(function(){
                $("#links").prepend("<li>Prepend</li>")
            });
            $(".afterBtn").click(function(){
                $("#links").after("<p>After the list</p>")
            });
            $(".beforeBtn").click(function(){
                $("#links").before("<p>Before the list</p>")
            });
            $(".removeBtn").click(function(){
                $("#links").remove()
            });
            $(".emptyBtn").click(function(){
                $("#links").empty()
            });
        });
    </script>
</body>
</html>
