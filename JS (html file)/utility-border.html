<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        span{
            display: inline-block;
            width: 100px;
            height: 100px;
            margin: 6px;
            background-color: cornsilk;
        }
    </style>
</head>
<body>
    <div class="container mt-3">
        <span class="border-top"></span>
        <span class="border-start"></span>
        <span class="border-end"></span>
        <span class="border-bottom"></span>
<hr>
        <span class="border border-1"></span>
        <span class="border border-2"></span>
        <span class="border border-3"></span>
        <span class="border border-4"></span>
        <span class="border border-5"></span>
<hr>
        <span class="border border-primary border-2"></span>
        <span class="border border-danger border-2"></span>
        <span class="border border-warning border-2"></span>
        <span class="border border-important border-2"></span>
        <span class="border border-success border-2"></span>
        <span class="border border-info border-2"></span>
        <span class="border border-secondary border-2"></span>
        <span class="border border-white border-2"></span>
        <span class="border border-dark border-2"></span>
        <span class="border border-body border-2"></span>
<hr>
        <span class="border border-2 border-danger rounded-top"></span>
        <span class="border border-2 border-danger rounded-bottom"></span>
        <span class="border border-2 border-danger rounded-end"></span>
        <span class="border border-2 border-danger rounded-start"></span>
        <br>
        <span class="border border-2 border-danger rounded-pill" style="width:200px"></span>
        <br>
        <span class="border border-2 border-danger rounded-1"></span>
        <span class="border border-2 border-danger rounded-2"></span>
        <span class="border border-2 border-danger rounded-3"></span>
        <span class="border border-2 border-danger rounded-4"></span>
        <span class="border border-2 border-danger rounded-5"></span>
    </div>
</body>
</html>
