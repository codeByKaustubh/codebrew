<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tooltip</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
    
    <div class="container mt-5">

        <button class="btn btn-primary m-5" data-bs-toggle="tooltip" title="Hello World" data-bs-placement="left">Hover Me</button>
        <button class="btn btn-primary m-5" data-bs-toggle="popover" title="Heading"  data-bs-content="This is some information" data-bs-placement="right" data-bs-trigger="focus">Click Me</button>
        
    </div>
    
    <script>
        var tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'))
        var tooltipList = tooltipTriggerList.map(function (tooltipTriggerEl) {
          return new bootstrap.Tooltip(tooltipTriggerEl)
        })

        var popoverTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="popover"]'))
        var popoverList = popoverTriggerList.map(function (popOverTriggerEl) {
          return new bootstrap.Popover(popOverTriggerEl)
        })
    </script>

</body>
</html>
