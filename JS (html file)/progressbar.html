<!DOCTYPE html>
<html lang="en">
<head>
  <title>Bootstrap Example</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>

<div class="container mt-3">
  <h2>Basic Progress Bar</h2>
  <p>To create a default progress bar, add a .progress class to a container element and add the progress-bar class to its child element. Use the CSS width property to set the width of the progress bar:</p>
  <div class="progress" style="height:20px">
    <div class="progress-bar bg-danger progress-bar-striped progress-bar-animated " style="width:0%" id="pgBar">0%</div>
  </div>
</div>
<br>
<div class="container" style="justify-content: center; display: flex; align-items: center;">
    <button class="btn btn-primary"  onclick="changeprogress()" >Daba!</button>    
</div>
<script>
    function changeprogress(){
        let progress = 0;
        let progressCounter = setInterval(()=>{
            progress += 10;
            if(progress >= 100){
                clearInterval(progressCounter)
            }
            document.getElementById('pgBar').style.width = `${progress}%`
            document.getElementById('pgBar').innerHTML = `${progress}%`
        },2000)
    }
</script>
</body>
</html>
