<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Carousel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
    
    <main class="container py-5">
    <div class="carousel slide mx-auto" id="carousel1" data-bs-ride="carousel">
        <div class="carousel-inner">
            <div class="carousel-item active">
                <img src="https://placehold.co/1200x450/0f172a/ffffff?text=Slide+1" alt="Dark placeholder slide" class="w-100 d-block">
                <div class="carousel-caption"><p>Slide 1</p></div>
            </div>
            <div class="carousel-item">
                <img src="https://placehold.co/1200x450/0f766e/ffffff?text=Slide+2" alt="Teal placeholder slide" class="w-100 d-block">
                <div class="carousel-caption"><p>Slide 2</p></div>
            </div>
            <div class="carousel-item">
                <img src="https://placehold.co/1200x450/7c3aed/ffffff?text=Slide+3" alt="Purple placeholder slide" class="w-100 d-block">
                <div class="carousel-caption"><p>Slide 3</p></div>
            </div>
        </div>
            <button class="carousel-control-prev" type="button" data-bs-target="#carousel1" data-bs-slide="prev">
                <span class="carousel-control-prev-icon"></span>
                <span class="visually-hidden">Previous</span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#carousel1" data-bs-slide="next">
                <span class="carousel-control-next-icon"></span>
                <span class="visually-hidden">Next</span>
            </button>
        <div class="carousel-indicators">
            <button type="button" data-bs-target="#carousel1" data-bs-slide-to="0" class="active" aria-label="Slide 1"></button>
            <button type="button" data-bs-target="#carousel1" data-bs-slide-to="1" aria-label="Slide 2"></button>
            <button type="button" data-bs-target="#carousel1" data-bs-slide-to="2" aria-label="Slide 3"></button>
        </div>
    </div></main>
</body>
</html>
