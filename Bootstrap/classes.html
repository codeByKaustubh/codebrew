<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Class Example</title>
</head>
<body>
    <main>
      <h1>JavaScript Class Example</h1>
      <p id="output"></p>
    </main>
    <script>
      class Car {
        constructor(name, model) {
          this.name = name;
          this.model = model;
          this.fuel = 500;
          this.speed = 0;
          this.isStarted = false;
        }
        start() { this.isStarted = true; }
        accelerate() { if (this.isStarted) this.speed += 10; }
        brake() { this.speed = Math.max(0, this.speed - 10); }
        status() { return `${this.name} ${this.model}: ${this.speed} km/h, ${this.fuel} km fuel`; }
      }
      const car = new Car('Volvo', 'XC40');
      car.start();
      car.accelerate();
      car.accelerate();
      car.brake();
      document.getElementById('output').textContent = car.status();
      console.log(car.status());
    </script>

</body>
</html>
