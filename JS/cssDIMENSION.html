<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jQuery CSS Dimensions</title>
    <script src="../jquery-4.0.0.min.js"></script>
    <style>
        body {
            margin: 2rem;
            font-family: Arial, sans-serif;
        }
        #box {
            width: 300px;
            height: 100px;
            padding: 16px;
            margin: 16px 0;
            border: 2px solid #dc2626;
            background: #e5e7eb;
        }
    </style>
</head>
<body>
    <h1>jQuery CSS Dimensions</h1>
    <div id="box">Click the button to inspect this box.</div>
    <button id="measure" type="button">Show dimensions</button>

    <script>
        $(function () {
            $('#measure').on('click', function () {
                const $box = $('#box');
                $box.html(`
                    width: ${$box.width()}px<br>
                    innerWidth: ${$box.innerWidth()}px<br>
                    outerWidth: ${$box.outerWidth()}px<br>
                    outerHeight (with margin): ${$box.outerHeight(true)}px
                `);
            });
        });
    </script>
</body>
</html>
